<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Bootcamp — Knowledge Graph Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --bg2: #eeeae0;
  --bg3: #e6e1d4;
  --card: #ffffff;
  --border: rgba(26,36,80,0.10);
  --border-hi: rgba(26,36,80,0.22);
  --text: #1a2450;
  --text2: #4a5580;
  --text3: #8a95b8;
  --accent: #c9aa5a;
  --accent2: #c8c0f0;
  --accent3: #1a2450;
  --accent4: #d4b8f0;
  --accent5: #7b6fc8;
  --navy: #1a2450;
  --butter: #c9aa5a;
  --lavender: #c8c0f0;
  --ff-title: 'DM Serif Display', serif;
  --ff-body: 'DM Sans', sans-serif;
  --ff-mono: 'DM Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ff-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* HEADER */
header {
  padding: 48px 40px 32px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  background: var(--navy);
}

.header-title {
  font-family: var(--ff-title);
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.1;
  color: #ffffff;
  font-style: italic;
}

.header-title em {
  color: var(--butter);
  font-style: normal;
}

.header-sub {
  color: var(--lavender);
  font-size: 13px;
  margin-top: 6px;
  font-weight: 300;
  letter-spacing: 0.02em;
}

.header-stats {
  display: flex;
  gap: 24px;
  flex-shrink: 0;
}

.stat {
  text-align: right;
}

.stat-n {
  font-family: var(--ff-mono);
  font-size: 22px;
  font-weight: 500;
  color: var(--butter);
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: var(--lavender);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
}

/* CONTROLS */
.controls {
  padding: 20px 40px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(247,245,240,0.95);
  backdrop-filter: blur(12px);
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}

.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.35;
  pointer-events: none;
}

#search {
  width: 100%;
  background: #ffffff;
  border: 0.5px solid var(--border-hi);
  color: var(--text);
  padding: 8px 12px 8px 36px;
  border-radius: 6px;
  font-family: var(--ff-body);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

#search:focus {
  border-color: var(--navy);
}

#search::placeholder { color: var(--text3); }

.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.filter-btn {
  background: #ffffff;
  border: 0.5px solid var(--border-hi);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--ff-body);
  transition: all 0.15s;
  white-space: nowrap;
}

.filter-btn:hover { border-color: var(--navy); color: var(--navy); }

.filter-btn.active {
  background: var(--navy);
  color: var(--butter);
  border-color: var(--navy);
  font-weight: 500;
}

.category-filter {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.cat-btn {
  background: transparent;
  border: 0.5px solid var(--border-hi);
  color: var(--text3);
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: var(--ff-mono);
  transition: all 0.15s;
  white-space: nowrap;
}

.cat-btn:hover { color: var(--navy); border-color: var(--navy); }
.cat-btn.active { color: var(--navy); border-color: var(--navy); font-weight: 500; }

/* LAYOUT */
.main {
  display: grid;
  grid-template-columns: 1fr 360px;
  min-height: calc(100vh - 200px);
}

/* GRID */
.grid-area {
  padding: 24px 40px;
  border-right: 0.5px solid var(--border);
}

.section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text3);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 2px;
  background: var(--butter);
  border-radius: 1px;
}

.result-count {
  font-family: var(--ff-mono);
  color: var(--text3);
  font-size: 11px;
}

.concepts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}

/* CONCEPT CARD */
.concept-card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(26,36,80,0.06);
}

.concept-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--card-accent, var(--border));
  transition: background 0.2s;
}

.concept-card:hover {
  border-color: var(--border-hi);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(26,36,80,0.10);
}

.concept-card.selected {
  border-color: var(--navy);
  background: rgba(26,36,80,0.04);
}

.concept-card.selected::before {
  background: var(--navy);
}

.concept-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--navy);
  margin-bottom: 4px;
  line-height: 1.3;
}

.concept-week {
  font-size: 10px;
  font-family: var(--ff-mono);
  color: var(--text3);
  margin-bottom: 6px;
}

.concept-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.tag {
  font-size: 10px;
  font-family: var(--ff-mono);
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--bg2);
  color: var(--text3);
  border: 0.5px solid var(--border);
}

.tag.cat-tag {
  color: var(--cat-color, var(--text3));
  border-color: var(--cat-color, var(--border));
  background: transparent;
}

/* DETAIL PANEL */
.detail-panel {
  padding: 24px 28px;
  overflow-y: auto;
  max-height: calc(100vh - 160px);
  position: sticky;
  top: 160px;
  background: #fff;
  border-left: 0.5px solid var(--border);
}

.detail-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  text-align: center;
  color: var(--text3);
}

.detail-empty-icon {
  font-size: 32px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.detail-empty p {
  font-size: 13px;
  max-width: 200px;
  line-height: 1.5;
}

.detail-header {
  margin-bottom: 20px;
}

.detail-name {
  font-family: var(--ff-title);
  font-size: 22px;
  line-height: 1.2;
  color: var(--navy);
  margin-bottom: 6px;
}

.detail-week-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-family: var(--ff-mono);
  color: #fff;
  background: var(--navy);
  padding: 3px 8px;
  border-radius: 4px;
}

.detail-section {
  margin-bottom: 20px;
}

.detail-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 0.5px solid var(--border);
}

.triplet {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 0.5px solid var(--border);
  font-size: 12px;
  line-height: 1.4;
}

.triplet:last-child { border-bottom: none; }

.triplet-subject {
  color: var(--navy);
  font-family: var(--ff-mono);
  font-size: 11px;
  min-width: 80px;
  flex-shrink: 0;
  margin-top: 1px;
  word-break: break-all;
}

.triplet-pred {
  color: var(--text3);
  font-style: italic;
  font-size: 11px;
  min-width: 80px;
  flex-shrink: 0;
  margin-top: 1px;
}

.triplet-obj {
  color: var(--text2);
  flex: 1;
}

.triplet-context {
  display: block;
  font-size: 10px;
  color: var(--text3);
  font-family: var(--ff-mono);
  margin-top: 2px;
}

.related-links {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.related-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  text-decoration: none;
  color: var(--text2);
  font-size: 12px;
  transition: all 0.15s;
}

.related-link:hover {
  border-color: var(--navy);
  color: var(--navy);
}

.related-link-pred {
  font-size: 10px;
  font-family: var(--ff-mono);
  color: var(--text3);
  min-width: 80px;
  flex-shrink: 0;
}

/* WEEK SECTIONS */
.week-section { margin-bottom: 32px; }
.week-title {
  font-family: var(--ff-title);
  font-size: 18px;
  color: var(--navy);
  margin-bottom: 4px;
}

.week-theme {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 16px;
  font-style: italic;
}

/* CAT COLORS — all readable on white/cream cards */
.cat-ai { --cat-color: #1a2450; }
.cat-python { --cat-color: #5a50b0; }
.cat-ml { --cat-color: #b07820; }
.cat-rag { --cat-color: #7050c0; }
.cat-agents { --cat-color: #c04060; }
.cat-pm { --cat-color: #106868; }
.cat-eval { --cat-color: #806020; }
.cat-green { --cat-color: #286820; }
.cat-legal { --cat-color: #8040b0; }
.cat-speech { --cat-color: #a04020; }

.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 14px;
}

/* PREDICATE BADGE */
.pred-badge {
  display: inline-block;
  font-size: 10px;
  font-family: var(--ff-mono);
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg2);
  color: var(--text2);
  border: 0.5px solid var(--border);
  margin-right: 4px;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--lavender); border-radius: 2px; }

@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
  .detail-panel { position: static; max-height: none; border-top: 0.5px solid var(--border); }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">Knowledge <em>Graph</em><br>Explorer</div>
    <div class="header-sub">AI Consulting Bootcamp — 9 weeks of concepts, relationships &amp; predicates</div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-n" id="stat-concepts">—</div>
      <div class="stat-label">Concepts</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="stat-triplets">—</div>
      <div class="stat-label">Triplets</div>
    </div>
    <div class="stat">
      <div class="stat-n">9</div>
      <div class="stat-label">Weeks</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="5"/><path d="M10.5 10.5L15 15" stroke-linecap="round"/></svg>
    <input type="text" id="search" placeholder="Search concepts, predicates, objects…" autocomplete="off">
  </div>
  <div class="filters" id="week-filters">
    <button class="filter-btn active" data-week="all">All</button>
    <button class="filter-btn" data-week="1">W1</button>
    <button class="filter-btn" data-week="2">W2</button>
    <button class="filter-btn" data-week="3">W3</button>
    <button class="filter-btn" data-week="4">W4</button>
    <button class="filter-btn" data-week="5">W5</button>
    <button class="filter-btn" data-week="6">W6</button>
    <button class="filter-btn" data-week="7">W7</button>
    <button class="filter-btn" data-week="8">W8</button>
    <button class="filter-btn" data-week="9">W9</button>
  </div>
  <div class="category-filter" id="cat-filters">
    <button class="cat-btn active" data-cat="all">all cats</button>
    <button class="cat-btn" data-cat="ai">ai</button>
    <button class="cat-btn" data-cat="ml">ml/nn</button>
    <button class="cat-btn" data-cat="python">python</button>
    <button class="cat-btn" data-cat="rag">rag</button>
    <button class="cat-btn" data-cat="agents">agents</button>
    <button class="cat-btn" data-cat="pm">pm</button>
    <button class="cat-btn" data-cat="eval">eval</button>
    <button class="cat-btn" data-cat="legal">legal</button>
    <button class="cat-btn" data-cat="green">green</button>
    <button class="cat-btn" data-cat="speech">speech</button>
  </div>
</div>

<div class="main">
  <div class="grid-area">
    <div class="section-label"><span>Concepts</span><span class="result-count" id="result-count"></span></div>
    <div class="concepts-grid" id="concepts-grid"></div>
    <div class="no-results" id="no-results" style="display:none">No concepts match your search</div>
  </div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty">
      <div class="detail-empty-icon">⬡</div>
      <p>Click any concept card to explore its relationships</p>
    </div>
  </div>
</div>

<script>
const DATA = [
  // WEEK 1 — AI LITERACY
  { id:"agentic-ai", name:"Agentic AI", week:1, cats:["ai","agents"],
    triplets:[
      {s:"Agentic AI",p:"denotes",o:"AI systems that autonomously plan, select tools, and execute multi-step tasks",ctx:"Week 1, AI Literacy"},
      {s:"LangChain",p:"orchestrates",o:"agentic AI workflows via composable chains and tool bindings",ctx:"Week 3"},
      {s:"LangGraph",p:"implements",o:"stateful agentic AI with graph-based control flow",ctx:"Week 4"},
      {s:"n8n AI Agent node",p:"runs",o:"agentic AI logic within no-code workflows",ctx:"Week 4"},
      {s:"ReAct pattern",p:"drives",o:"agentic AI reasoning–acting loop",ctx:"Week 4"},
    ]},
  { id:"narrow-ai", name:"Narrow AI", week:1, cats:["ai"],
    triplets:[{s:"Narrow AI",p:"specializes",o:"AI capability confined to a single domain or task",ctx:"Week 1"}]},
  { id:"agi", name:"AGI", week:1, cats:["ai"],
    triplets:[{s:"AGI",p:"specializes",o:"hypothetical AI capable of human-level reasoning across any domain",ctx:"Week 1"}]},
  { id:"llm", name:"Large Language Models (LLMs)", week:1, cats:["ai"],
    triplets:[
      {s:"LLM",p:"specializes",o:"transformer-scale language model pre-trained on large text corpora",ctx:"Week 1"},
      {s:"Generative AI",p:"relies-on",o:"LLMs as the core generation model class",ctx:"Week 1"},
    ]},
  { id:"multimodal-ai", name:"Multimodal AI", week:1, cats:["ai"],
    triplets:[
      {s:"Multimodal AI",p:"specializes",o:"AI that processes and generates across vision, audio, and text simultaneously",ctx:"Week 1"},
      {s:"Multimodal AI",p:"enables",o:"joint reasoning over images, speech, and text in a single model pass",ctx:"Week 1"},
      {s:"Vision API",p:"implements",o:"multimodal AI for image-plus-text LLM inputs",ctx:"Week 1"},
    ]},
  { id:"moravecs-paradox", name:"Moravec's Paradox", week:1, cats:["ai"],
    triplets:[{s:"Moravec's paradox",p:"illustrates",o:"that tasks trivial for humans are computationally hard for AI, and vice versa",ctx:"Week 1"}]},
  { id:"conda", name:"Conda", week:1, cats:["python"],
    triplets:[{s:"Conda",p:"isolates",o:"Python runtime environments per project to prevent dependency conflicts",ctx:"Week 1"}]},
  { id:"git", name:"Git / GitHub", week:1, cats:["python"],
    triplets:[
      {s:"Git",p:"tracks",o:"version history of code and content through commits and branches",ctx:"Week 1"},
      {s:"GitHub",p:"hosts",o:"remote repositories and pull-request-based collaboration workflows",ctx:"Week 1"},
    ]},
  { id:"pandas", name:"Pandas & Data Manipulation", week:1, cats:["python","ml"],
    triplets:[
      {s:"Pandas",p:"loads-and-transforms",o:"tabular data for filtering, grouping, aggregation, and export",ctx:"Week 1"},
      {s:"Descriptive statistics",p:"summarizes",o:"column distributions, central tendency, and spread",ctx:"Week 1"},
      {s:"Feature engineering",p:"derives",o:"new columns from raw fields to improve model input quality",ctx:"Week 1"},
      {s:"Missing values",p:"require",o:"cleaning or imputation before model training",ctx:"Week 1"},
    ]},
  { id:"supervised-learning", name:"Supervised Learning", week:1, cats:["ml"],
    triplets:[
      {s:"Supervised learning",p:"trains",o:"models on labeled input–output pairs",ctx:"Week 1"},
      {s:"Supervised learning",p:"produces",o:"classifiers and regressors for prediction tasks",ctx:"Week 1"},
    ]},
  { id:"unsupervised-learning", name:"Unsupervised Learning", week:1, cats:["ml"],
    triplets:[
      {s:"Unsupervised learning",p:"discovers",o:"structure in data without labeled targets",ctx:"Week 1"},
      {s:"Unsupervised learning",p:"produces",o:"clusters and dimensionality reductions",ctx:"Week 1"},
    ]},
  { id:"knn", name:"K-Nearest Neighbors (KNN)", week:1, cats:["ml"],
    triplets:[
      {s:"KNN",p:"specializes",o:"distance-based supervised classification",ctx:"Week 1"},
      {s:"Scikit-learn",p:"implements",o:"KNN and other classical ML estimators",ctx:"Week 1"},
    ]},
  { id:"fine-tuning", name:"Fine-Tuning", week:1, cats:["ml","ai"],
    triplets:[
      {s:"Fine-tuning",p:"specializes",o:"supervised training that updates a pre-trained model's weights on domain-specific data",ctx:"Week 1"},
      {s:"Fine-tuning",p:"contrasts-with",o:"RAG: fine-tuning bakes knowledge into weights; RAG retrieves at inference time",ctx:"Week 1–3"},
      {s:"Fine-tuning",p:"preferred-when",o:"domain knowledge is stable, high-volume, and latency-sensitive",ctx:"Week 1"},
      {s:"Fine-tuning",p:"avoid-when",o:"knowledge changes frequently or proprietary data cannot leave the org",ctx:"Week 1"},
      {s:"Fine-tuning",p:"increases-cost",o:"relative to prompting due to compute and data-preparation overhead",ctx:"Week 1"},
    ]},
  { id:"deep-learning", name:"Deep Learning & Neural Networks", week:1, cats:["ml"],
    triplets:[
      {s:"Deep learning",p:"specializes",o:"machine learning using multi-layer neural networks",ctx:"Week 1"},
      {s:"Neural network",p:"specializes",o:"machine learning model composed of interconnected layers of neurons",ctx:"Week 1"},
      {s:"Feedforward neural network",p:"trained-via",o:"backpropagation and gradient descent",ctx:"Week 1"},
      {s:"Activation function",p:"introduces",o:"nonlinearity into neural network layer outputs",ctx:"Week 1"},
      {s:"Overfitting",p:"occurs-when",o:"a model memorizes training data and fails to generalize",ctx:"Week 1"},
      {s:"Keras",p:"provides",o:"high-level API for defining, compiling, and training neural network layers",ctx:"Week 1"},
      {s:"TensorFlow",p:"backs",o:"Keras computation graph construction and distributed execution",ctx:"Week 1"},
    ]},
  { id:"generative-ai", name:"Generative AI", week:1, cats:["ai"],
    triplets:[
      {s:"Generative AI",p:"produces",o:"new text, images, or audio by sampling from learned probability distributions",ctx:"Week 1"},
      {s:"Encoder–decoder",p:"transforms",o:"an input sequence into a context vector and decodes it into an output",ctx:"Week 1"},
      {s:"Attention mechanism",p:"weights",o:"token relevance across a sequence for context integration",ctx:"Week 1"},
      {s:"Chat Completions API",p:"structures",o:"LLM interactions as a sequence of role-tagged message turns",ctx:"Week 1"},
      {s:"Temperature",p:"controls",o:"LLM token sampling randomness during decoding",ctx:"Week 1"},
      {s:"Pydantic",p:"validates",o:"structured output by enforcing typed field schemas on LLM responses",ctx:"Week 1"},
    ]},
  { id:"system-prompt", name:"System Prompt", week:1, cats:["ai"],
    triplets:[
      {s:"System prompt",p:"constrains",o:"LLM behavior, persona, and output format across all turns in a session",ctx:"Week 1–2"},
      {s:"System prompt",p:"preferred-when",o:"consistent behavior must be enforced regardless of user turn content",ctx:"Week 1–2"},
      {s:"System prompt",p:"overridden-by",o:"prompt injection attacks that insert conflicting instructions",ctx:"Week 4"},
    ]},
  { id:"whisper", name:"Whisper (Speech-to-Text)", week:1, cats:["speech"],
    triplets:[
      {s:"Whisper",p:"implements",o:"STT via transformer-based audio encoding",ctx:"Week 1"},
      {s:"Whisper",p:"handles",o:"long-form audio through sequential chunked transcription",ctx:"Week 1"},
      {s:"WER",p:"measures",o:"STT transcription accuracy at the word level",ctx:"Week 1"},
      {s:"WER",p:"computed-as",o:"(substitutions + deletions + insertions) / reference word count",ctx:"Week 1"},
    ]},
  { id:"tts", name:"Text-to-Speech (TTS)", week:1, cats:["speech"],

    ]},

  // PROVIDERS
  { id:"providers", name:"AI Providers (OpenAI, Anthropic, Google, Cohere)", week:1, cats:["ai"],
    triplets:[
      {s:"OpenAI",p:"offers",o:"GPT-4o, GPT-4.1, o3, Whisper, TTS, DALL-E, and text-embedding-3 models via API",ctx:"Week 1–4"},
      {s:"OpenAI",p:"known-for",o:"leading chat completions API, developer ecosystem, and function calling support",ctx:"Week 1"},
      {s:"Anthropic",p:"offers",o:"Claude 3.5 Sonnet, Claude 3 Opus, and Haiku via API and Claude.ai",ctx:"Week 2"},
      {s:"Anthropic",p:"known-for",o:"Constitutional AI training methodology and safety-focused model development",ctx:"Week 2"},
      {s:"Google",p:"offers",o:"Gemini model family via Vertex AI and Google AI Studio",ctx:"Week 2"},
      {s:"Google",p:"known-for",o:"multimodal capability, long context windows, and enterprise data residency via Vertex AI",ctx:"Week 2"},
      {s:"Cohere",p:"offers",o:"Command R+ generation models, Embed API, and Rerank API",ctx:"Week 3"},
      {s:"Cohere",p:"known-for",o:"enterprise-grade multilingual embeddings and dedicated reranking endpoint",ctx:"Week 3"},
      {s:"ElevenLabs",p:"offers",o:"voice cloning, multilingual TTS, and voice design API",ctx:"Week 2"},
      {s:"ElevenLabs",p:"known-for",o:"highest-quality neural TTS with voice cloning and emotional prosody control",ctx:"Week 2"},
    ]},
];

const WEEK_THEMES = {
  1: "AI basics, Python, ML/NN, GenAI & APIs, speech",
  2: "Mini-project, prompting, low-code Python, APIs, RAG intro",
  3: "Project 2, LangChain, RAG pipeline, MCP",
  4: "LangGraph, n8n, autonomous agents",
  5: "Project 3 — autonomous research agent",
  6: "Classical PM, Agile, SilverTrust, migration",
  7: "Evaluation, A/B testing, BI, Project 5",
  8: "Green tech, EU AI Act, GDPR, final project kickoff",
  9: "Final project delivery",
};

const CAT_COLORS = {
  ai: "#1a2450", python: "#5a50b0", ml: "#b07820", rag: "#7050c0",
  agents: "#c04060", pm: "#106868", eval: "#806020",
  green: "#286820", legal: "#8040b0", speech: "#a04020"
};

let selectedWeek = "all";
let selectedCat = "all";
let searchQuery = "";
let selectedConcept = null;

function init() {
  document.getElementById("stat-concepts").textContent = DATA.length;
  const totalTriplets = DATA.reduce((a,d) => a + d.triplets.length, 0);
  document.getElementById("stat-triplets").textContent = totalTriplets;

  document.getElementById("search").addEventListener("input", e => {
    searchQuery = e.target.value.toLowerCase();
    render();
  });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedWeek = btn.dataset.week;
      render();
    });
  });

  document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedCat = btn.dataset.cat;
      render();
    });
  });

  render();
}

function filteredData() {
  return DATA.filter(d => {
    if (selectedWeek !== "all" && d.week !== parseInt(selectedWeek)) return false;
    if (selectedCat !== "all" && !d.cats.includes(selectedCat)) return false;
    if (searchQuery) {
      const haystack = [
        d.name,
        ...d.triplets.map(t => `${t.s} ${t.p} ${t.o} ${t.ctx}`)
      ].join(" ").toLowerCase();
      if (!haystack.includes(searchQuery)) return false;
    }
    return true;
  });
}

function render() {
  const data = filteredData();
  const grid = document.getElementById("concepts-grid");
  const noResults = document.getElementById("no-results");
  const count = document.getElementById("result-count");

  count.textContent = `${data.length} of ${DATA.length}`;

  if (data.length === 0) {
    grid.innerHTML = "";
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  // Group by week if showing all
  if (selectedWeek === "all" && !searchQuery && selectedCat === "all") {
    // Group by week
    const weeks = {};
    data.forEach(d => {
      if (!weeks[d.week]) weeks[d.week] = [];
      weeks[d.week].push(d);
    });
    grid.innerHTML = Object.entries(weeks).map(([w, concepts]) => `
      <div class="week-section" style="grid-column: 1/-1;">
        <div class="week-title">Week ${w}</div>
        <div class="week-theme">${WEEK_THEMES[w] || ""}</div>
        <div class="concepts-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;">
          ${concepts.map(d => conceptCard(d)).join("")}
        </div>
      </div>
    `).join("");
  } else {
    grid.innerHTML = data.map(d => conceptCard(d)).join("");
  }

  grid.querySelectorAll(".concept-card").forEach(card => {
    card.addEventListener("click", () => {
      const id = card.dataset.id;
      const concept = DATA.find(d => d.id === id);
      selectConcept(concept);
      grid.querySelectorAll(".concept-card").forEach(c => c.classList.remove("selected"));
      card.classList.add("selected");
    });
  });
}

function conceptCard(d) {
  const accentColor = d.cats.map(c => CAT_COLORS[c]).filter(Boolean)[0] || "#555";
  const isSelected = selectedConcept && selectedConcept.id === d.id;
  return `
    <div class="concept-card${isSelected ? " selected" : ""}" data-id="${d.id}"
         style="--card-accent: ${accentColor}">
      <div class="concept-name">${d.name}</div>
      <div class="concept-week">Week ${d.week} · ${d.triplets.length} triplet${d.triplets.length!==1?"s":""}</div>
      <div class="concept-tags">
        ${d.cats.map(c => `<span class="tag cat-tag" style="--cat-color:${CAT_COLORS[c]||"#555"}">${c}</span>`).join("")}
      </div>
    </div>
  `;
}

function selectConcept(concept) {
  selectedConcept = concept;
  const panel = document.getElementById("detail-panel");

  // Find related concepts (concepts that share triplet subjects/objects)
  const relatedNames = new Set();
  concept.triplets.forEach(t => {
    relatedNames.add(t.s.toLowerCase());
    const words = t.o.toLowerCase().split(/\s+/);
    DATA.forEach(d => {
      if (d.id !== concept.id && d.name.split(/\s+/).some(w => words.includes(w.toLowerCase()))) {
        relatedNames.add(d.name.toLowerCase());
      }
    });
  });
  const related = DATA.filter(d => d.id !== concept.id && (
    concept.triplets.some(t => t.s.toLowerCase().includes(d.name.toLowerCase().split(" ")[0]) ||
                               t.o.toLowerCase().includes(d.name.toLowerCase().split(" ")[0]))
  )).slice(0, 6);

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-name">${concept.name}</div>
      <span class="detail-week-badge">Week ${concept.week} — ${WEEK_THEMES[concept.week] || ""}</span>
      <div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;">
        ${concept.cats.map(c => `<span class="tag cat-tag" style="--cat-color:${CAT_COLORS[c]||"#555"}">${c}</span>`).join("")}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Relationships &amp; triplets (${concept.triplets.length})</div>
      ${concept.triplets.map(t => `
        <div class="triplet">
          <div class="triplet-subject">${t.s}</div>
          <div class="triplet-pred">${t.p}</div>
          <div class="triplet-obj">
            ${t.o}
            <span class="triplet-context">${t.ctx}</span>
          </div>
        </div>
      `).join("")}
    </div>

    ${related.length > 0 ? `
    <div class="detail-section">
      <div class="detail-section-title">Related concepts</div>
      <div class="related-links">
        ${related.map(r => `
          <div class="related-link" onclick="jumpTo('${r.id}')">
            <span style="color:${(r.cats.map(c=>CAT_COLORS[c]).filter(Boolean)[0])||"#555"};font-size:8px;">⬡</span>
            <span style="flex:1">${r.name}</span>
            <span class="related-link-pred">W${r.week}</span>
          </div>
        `).join("")}
      </div>
    </div>
    ` : ""}
  `;
}

function jumpTo(id) {
  const concept = DATA.find(d => d.id === id);
  if (!concept) return;
  // Reset filters to show this concept
  selectedWeek = "all";
  selectedCat = "all";
  searchQuery = "";
  document.getElementById("search").value = "";
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.week === "all"));
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === "all"));
  selectConcept(concept);
  render();
  setTimeout(() => {
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) { card.classList.add("selected"); card.scrollIntoView({behavior:"smooth",block:"center"}); }
  }, 50);
}

init();
</script>
</body>
</html>
